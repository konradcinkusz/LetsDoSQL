name: Build & Release PDF

on:
  push:
    tags:
      - 'v*'            # trigger on version tags

permissions:
  contents: write       # needed to create a release via API

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: xu-cheng/latex-action@v4
        with:
          root_file: docs/main.tex
          latexmk_use_xelatex: true
          latexmk_shell_escape: true
      - name: Rename PDF
        run: mv docs/main.pdf WWI_SQL_Exercises.pdf
      - uses: actions/upload-artifact@v4
        with:
          name: WWI_SQL_Exercises
          path: WWI_SQL_Exercises.pdf

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: WWI_SQL_Exercises
      - uses: softprops/action-gh-release@v2
        with:
          files: WWI_SQL_Exercises.pdf
